<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Beauté Mell — Carte de visite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--sakura:#f9c8d4;--rose:#e07898;--gold:#d4a870;--cream:#fffbfc;--brown:#7a4828;--dark:#2a1a1a;--text:#4a3030;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'Jost',sans-serif;font-weight:300;background:var(--cream);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}

#petal-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

.card{
  position:relative;z-index:1;width:100%;max-width:400px;
  background:#fff;border-radius:32px;padding:44px 32px 36px;
  text-align:center;
  box-shadow:0 20px 60px rgba(224,120,152,.12),0 0 0 1px rgba(249,200,212,.25);
}

/* Logo with SVG petal ring */
.logo-wrap{position:relative;width:120px;height:120px;margin:0 auto 24px;}
.logo-circle{
  width:80px;height:80px;border-radius:50%;background:#fff;
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(224,120,152,.15);z-index:2;
}
.logo-initials{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.8rem;color:var(--rose);letter-spacing:.02em;}
.petal-ring{position:absolute;inset:0;animation:spinRing 12s linear infinite;}
@keyframes spinRing{to{transform:rotate(360deg);}}

.card-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:2.2rem;color:var(--dark);margin-bottom:4px;line-height:1.1;}
.card-brand{font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:var(--rose);margin-bottom:16px;font-weight:400;}

.card-divider{width:60px;height:2px;margin:0 auto 16px;background:linear-gradient(90deg,var(--rose),var(--gold));}

.card-subtitle{font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:28px;}

.card-contacts{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.card-link{
  display:flex;align-items:center;gap:14px;padding:13px 18px;border-radius:14px;
  background:rgba(249,200,212,.08);text-decoration:none;color:var(--text);transition:all .2s;
}
.card-link:hover{background:rgba(249,200,212,.2);transform:translateX(4px);}
.card-link-icon{width:38px;height:38px;border-radius:11px;background:var(--sakura);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.card-link-label{font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;color:#9a7878;display:block;}
.card-link-value{font-size:.88rem;color:var(--dark);}

.card-actions{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.card-btn-primary{
  width:100%;padding:15px;border-radius:14px;border:none;
  background:var(--rose);color:#fff;
  font-family:'Jost',sans-serif;font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;transition:all .3s;
}
.card-btn-primary:hover{background:var(--brown);transform:translateY(-2px);}
.card-btn-secondary{
  width:100%;padding:14px;border-radius:14px;border:1.5px solid var(--rose);background:transparent;
  color:var(--rose);font-family:'Jost',sans-serif;font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;text-decoration:none;display:block;text-align:center;transition:all .3s;
}
.card-btn-secondary:hover{background:var(--rose);color:#fff;transform:translateY(-2px);}

/* Serenity badge */
.card-badge{margin-top:24px;display:flex;justify-content:center;}
.sb{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;position:relative;width:70px;height:70px;}
.sb-ring{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.02);border:1px solid rgba(0,0,0,.06);}
.sb-shimmer{position:absolute;inset:-2px;border-radius:50%;background:conic-gradient(from var(--a,0deg),transparent 0%,rgba(212,168,112,.35) 20%,transparent 40%);animation:sbspin 3s linear infinite;}
@keyframes sbspin{to{--a:360deg;}}
@property --a{syntax:'<angle>';initial-value:0deg;inherits:false;}
.sb-text{position:absolute;inset:0;}
.sb-init{font-family:'Cormorant Garamond',serif;font-size:.9rem;background:linear-gradient(135deg,#4fc3f7,#26a69a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative;z-index:2;}
</style>
</head>
<body>

<canvas id="petal-canvas"></canvas>

<div class="card">
  <div class="logo-wrap">
    <svg class="petal-ring" viewBox="0 0 120 120">
      <g transform="translate(60,60)">
        <g><ellipse cx="0" cy="-42" rx="10" ry="16" fill="#f9c8d4" opacity=".7"/></g>
        <g transform="rotate(36)"><ellipse cx="0" cy="-42" rx="10" ry="16" fill="#f5b8c8" opacity=".65"/></g>
        <g transform="rotate(72)"><ellipse cx="0" cy="-42" rx="10" ry="16" fill="#f9c8d4" opacity=".7"/></g>
        <g transform="rotate(108)"><ellipse cx="0" cy="-42" rx="10" ry="16" fill="#f5b8c8" opacity=".65"/></g>
        <g transform="rotate(144)"><ellipse cx="0" cy="-42" rx="10" ry="16" fill="#f9c8d4" opacity=".7"/></g>
        <g transform="rotate(180)"><ellipse cx="0" cy="-42" rx="10" ry="16" fill="#f5b8c8" opacity=".65"/></g>
        <g transform="rotate(216)"><ellipse cx="0" cy="-42" rx="10" ry="16" fill="#f9c8d4" opacity=".7"/></g>
        <g transform="rotate(252)"><ellipse cx="0" cy="-42" rx="10" ry="16" fill="#f5b8c8" opacity=".65"/></g>
        <g transform="rotate(288)"><ellipse cx="0" cy="-42" rx="10" ry="16" fill="#f9c8d4" opacity=".7"/></g>
        <g transform="rotate(324)"><ellipse cx="0" cy="-42" rx="10" ry="16" fill="#f5b8c8" opacity=".65"/></g>
      </g>
    </svg>
    <div class="logo-circle"><span class="logo-initials">BM</span></div>
  </div>

  <h1 class="card-name">Mell</h1>
  <p class="card-brand">Beaute Mell</p>
  <div class="card-divider"></div>
  <p class="card-subtitle">Onglerie · Saint-Georges · Liege</p>

  <div class="card-contacts">
    <a href="tel:+32000000000" class="card-link">
      <div class="card-link-icon">📞</div>
      <div><span class="card-link-label">Telephone</span><span class="card-link-value">+32 000 00 00 00</span></div>
    </a>
    <a href="https://www.facebook.com/profile.php?id=61572533833331" target="_blank" class="card-link">
      <div class="card-link-icon">📘</div>
      <div><span class="card-link-label">Facebook</span><span class="card-link-value">Beaute Mell</span></div>
    </a>
    <a href="#" class="card-link">
      <div class="card-link-icon">📸</div>
      <div><span class="card-link-label">Instagram</span><span class="card-link-value">@beautemell</span></div>
    </a>
  </div>

  <div class="card-actions">
    <button class="card-btn-primary" onclick="downloadVCard()">+ Ajouter a mes contacts</button>
    <a href="https://plateoo.github.io/beautemell/" class="card-btn-secondary">Voir le portfolio</a>
  </div>

  <div class="card-badge">
    <a href="https://plateoo.github.io/serenity-studio/" target="_blank" class="sb" title="Serenity Studio">
      <div class="sb-shimmer"></div><div class="sb-ring"></div>
      <svg class="sb-text" viewBox="0 0 70 70"><defs><path id="cp" d="M 35,35 m -24,0 a 24,24 0 1,1 48,0 a 24,24 0 1,1 -48,0"/></defs><text fill="rgba(0,0,0,.3)" font-size="6" font-family="Jost,sans-serif" letter-spacing="1.5"><textPath href="#cp">SERENITY STUDIO · BELGIQUE · </textPath></text></svg>
      <span class="sb-init">SS</span>
    </a>
  </div>
</div>

<script>
/* Floating sakura petals — subtle */
(function(){
const c=document.getElementById('petal-canvas');
const ctx=c.getContext('2d');
let W,H;const petals=[];
function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
function init(){
  for(let i=0;i<10;i++)petals.push({
    x:Math.random()*W,y:Math.random()*H,r:5+Math.random()*7,
    vx:-.08+Math.random()*.16,vy:.15+Math.random()*.3,
    rot:Math.random()*Math.PI*2,vr:(.5-Math.random())*.015,
    alpha:.12+Math.random()*.2,phase:Math.random()*Math.PI*2
  });
}
function drawPetal(p){
  ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.globalAlpha=p.alpha;
  const L=p.r,W2=L*.55;
  ctx.beginPath();ctx.moveTo(0,0);
  ctx.bezierCurveTo(-W2*.8,-L*.2,-W2,-L*.6,0,-L);
  ctx.bezierCurveTo(W2,-L*.6,W2*.8,-L*.2,0,0);
  const g=ctx.createLinearGradient(0,0,0,-L);g.addColorStop(0,'#fff0f3');g.addColorStop(1,'#f5a8c0');
  ctx.fillStyle=g;ctx.fill();ctx.restore();
}
function animate(){
  ctx.clearRect(0,0,W,H);const t=Date.now()*.001;
  petals.forEach(p=>{
    p.x+=p.vx+Math.sin(t+p.phase)*.2;p.y+=p.vy;p.rot+=p.vr;
    if(p.y>H+20){p.y=-20;p.x=Math.random()*W;}
    if(p.x<-20)p.x=W+20;if(p.x>W+20)p.x=-20;
    drawPetal(p);
  });
  requestAnimationFrame(animate);
}
addEventListener('resize',resize);resize();init();animate();
})();

/* vCard download */
function downloadVCard(){
  const vc=`BEGIN:VCARD
VERSION:3.0
FN:Mell - Beaute Mell
ORG:Beaute Mell
TITLE:Ongliste
TEL;TYPE=CELL:+32000000000
URL:https://plateoo.github.io/beautemell/
ADR;TYPE=WORK:;;Saint-Georges;Liege;;4000;Belgique
NOTE:Onglerie - Gel, Resine, VSP, Nail Art
END:VCARD`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([vc],{type:'text/vcard'}));
  a.download='Mell-BeauteMell.vcf';a.click();
}
</script>
</body>
</html>
