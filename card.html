<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Beauté Mell — Carte de visite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--sakura:#f9c8d4;--rose:#e07898;--gold:#d4a870;--cream:#fffbfc;--brown:#7a4828;--dark:#2a1a1a;--text:#4a3030;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Jost',sans-serif;font-weight:300;background:var(--cream);color:var(--text);display:flex;align-items:center;justify-content:center;}

#petal-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

.card{
  position:relative;z-index:1;
  width:90vw;max-width:380px;
  background:#fff;border-radius:32px;
  padding:48px 36px 40px;
  text-align:center;
  box-shadow:0 20px 60px rgba(224,120,152,.12),0 0 0 1px rgba(249,200,212,.25);
}

/* Logo Ring */
.logo-wrap{position:relative;width:110px;height:110px;margin:0 auto 28px;}
#logo-ring{position:absolute;inset:0;width:110px;height:110px;}
.logo-initials{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:2.2rem;
  color:var(--rose);letter-spacing:.02em;
}

.card-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:2rem;color:var(--dark);margin-bottom:4px;line-height:1.1;}
.card-brand{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:var(--rose);margin-bottom:10px;}
.card-subtitle{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:28px;}
.card-divider{width:40px;height:1px;background:var(--sakura);margin:0 auto 24px;}

/* Contacts */
.card-contacts{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.card-link{
  display:flex;align-items:center;gap:12px;
  padding:12px 18px;border-radius:14px;
  background:rgba(249,200,212,.1);
  text-decoration:none;color:var(--text);
  font-size:.85rem;transition:all .2s;
}
.card-link:hover{background:rgba(249,200,212,.25);transform:translateX(4px);}
.card-link-icon{width:36px;height:36px;border-radius:10px;background:var(--sakura);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.card-link-label{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block;}
.card-link-value{font-size:.88rem;color:var(--dark);}

/* Buttons */
.card-actions{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.card-btn-primary{
  width:100%;padding:14px;border-radius:14px;border:none;
  background:var(--rose);color:#fff;
  font-family:'Jost',sans-serif;font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;transition:all .3s;
}
.card-btn-primary:hover{background:var(--brown);transform:translateY(-2px);}
.card-btn-secondary{
  width:100%;padding:13px;border-radius:14px;
  border:1.5px solid var(--rose);background:transparent;color:var(--rose);
  font-family:'Jost',sans-serif;font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;text-decoration:none;display:block;text-align:center;transition:all .3s;
}
.card-btn-secondary:hover{background:var(--rose);color:#fff;transform:translateY(-2px);}

.card-footer{margin-top:24px;font-size:.65rem;color:rgba(154,120,120,.5);letter-spacing:.1em;text-transform:uppercase;}
</style>
</head>
<body>

<canvas id="petal-canvas"></canvas>

<div class="card">
  <div class="logo-wrap">
    <canvas id="logo-ring" width="110" height="110"></canvas>
    <span class="logo-initials">BM</span>
  </div>

  <h1 class="card-name">Mell</h1>
  <p class="card-brand">Beauté Mell</p>
  <p class="card-subtitle">Onglerie · Saint-Georges · Liège</p>
  <div class="card-divider"></div>

  <div class="card-contacts">
    <a href="tel:+32000000000" class="card-link">
      <div class="card-link-icon">📞</div>
      <div><span class="card-link-label">Téléphone</span><span class="card-link-value">+32 000 00 00 00</span></div>
    </a>
    <a href="https://www.facebook.com/profile.php?id=61572533833331" target="_blank" class="card-link">
      <div class="card-link-icon">📘</div>
      <div><span class="card-link-label">Facebook</span><span class="card-link-value">Beauté Mell</span></div>
    </a>
    <a href="#" class="card-link">
      <div class="card-link-icon">📸</div>
      <div><span class="card-link-label">Instagram</span><span class="card-link-value">@beautemell</span></div>
    </a>
  </div>

  <div class="card-actions">
    <button class="card-btn-primary" onclick="downloadVCard()">+ Ajouter à mes contacts</button>
    <a href="index.html" class="card-btn-secondary">Voir le portfolio</a>
  </div>

  <p class="card-footer">Beauté Mell · Saint-Georges · Liège</p>
</div>

<script>
/* ═══ FLOATING PETALS ═══ */
(function(){
  const c=document.getElementById('petal-canvas');
  const ctx=c.getContext('2d');
  let W,H;
  const petals=[];

  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;if(petals.length===0)init();}

  function init(){
    for(let i=0;i<18;i++){
      petals.push({
        x:Math.random()*W,y:Math.random()*H,
        r:4+Math.random()*8,
        vx:-.15+Math.random()*.3,vy:.2+Math.random()*.5,
        rot:Math.random()*Math.PI*2,vr:(.5-Math.random())*.02,
        alpha:.15+Math.random()*.25,
        phase:Math.random()*Math.PI*2
      });
    }
  }

  function drawPetal(p){
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha=p.alpha;
    const L=p.r,W2=L*.6;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(-W2*.8,-L*.2,-W2,-L*.6,0,-L);
    ctx.bezierCurveTo(W2,-L*.6,W2*.8,-L*.2,0,0);
    const g=ctx.createLinearGradient(0,0,0,-L);
    g.addColorStop(0,'#fff0f3');g.addColorStop(1,'#f5a8c0');
    ctx.fillStyle=g;ctx.fill();
    ctx.restore();
  }

  function animate(){
    ctx.clearRect(0,0,W,H);
    const t=Date.now()*.001;
    petals.forEach(p=>{
      p.x+=p.vx+Math.sin(t+p.phase)*.3;
      p.y+=p.vy;
      p.rot+=p.vr;
      if(p.y>H+20){p.y=-20;p.x=Math.random()*W;}
      if(p.x<-20)p.x=W+20;
      if(p.x>W+20)p.x=-20;
      drawPetal(p);
    });
    requestAnimationFrame(animate);
  }

  addEventListener('resize',resize);
  resize();animate();
})();

/* ═══ LOGO RING — rotating petals ═══ */
(function(){
  const c=document.getElementById('logo-ring');
  const ctx=c.getContext('2d');
  const cx=55,cy=55,R=42;

  function drawRing(){
    ctx.clearRect(0,0,110,110);
    const t=Date.now()*.0004;
    /* Ring circle */
    ctx.beginPath();ctx.arc(cx,cy,R+2,0,Math.PI*2);
    ctx.strokeStyle='rgba(249,200,212,.25)';ctx.lineWidth=1;ctx.stroke();
    /* 10 petals around ring */
    for(let i=0;i<10;i++){
      const a=t+(i/10)*Math.PI*2;
      const px=cx+Math.cos(a)*R,py=cy+Math.sin(a)*R;
      ctx.save();ctx.translate(px,py);ctx.rotate(a+Math.PI/2);
      const L=8,W=5;
      ctx.beginPath();ctx.moveTo(0,0);
      ctx.bezierCurveTo(-W*.7,-L*.3,-W,-L*.65,0,-L);
      ctx.bezierCurveTo(W,-L*.65,W*.7,-L*.3,0,0);
      ctx.fillStyle=`rgba(249,200,212,${.4+Math.sin(a*2)*.15})`;
      ctx.fill();ctx.restore();
    }
    requestAnimationFrame(drawRing);
  }
  drawRing();
})();

/* ═══ vCard DOWNLOAD ═══ */
function downloadVCard(){
  const vcard=`BEGIN:VCARD
VERSION:3.0
FN:Mell - Beauté Mell
ORG:Beauté Mell
TITLE:Ongliste
TEL;TYPE=CELL:+32000000000
URL:https://plateoo.github.io/beautemell/
ADR;TYPE=WORK:;;Saint-Georges;Liège;;4000;Belgique
NOTE:Onglerie - Gel · Résine · VSP · Nail Art
END:VCARD`;
  const blob=new Blob([vcard],{type:'text/vcard'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='beaute-mell.vcf';
  a.click();
}
</script>
</body>
</html>
